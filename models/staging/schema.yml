version: 2

models:
  - name: stg_users
    description: "Staging model for user demographics. Standardizes column names and casts timestamps to UTC."
    columns:
      - name: user_id
        description: "Primary key. Unique identifier for each user."
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
      - name: created_at_utc
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']
          
  - name: stg_distribution_centers
    description: "Staging model for distribution centers."
    columns:
      - name: distribution_center_id
        description: "Primary key. Unique identifier for each distribution center."
        tests:
          - unique
          - not_null
      - name: name
        tests:
          - unique
          - not_null
      - name: latitude
        description: "Latitude coordinate of the distribution center."
        tests:
          - not_null
      - name: longitude
        description: "Longitude coordinate of the distribution center."
        tests:
          - not_null

  - name: stg_events
    description: "Staging model for user event logs. Granularity is one row per event."
    columns:
      - name: event_id
        description: "Unique identifier for each event."
        tests:
          - unique
          - not_null
      - name: session_id
        description: "Identifier for the session during which the event occurred."
        tests:
          - not_null
      - name: created_at_utc
        tests:
          - not_null

  - name: stg_inventory_items
    description: "Staging model for inventory items. Granularity is one row per physical item."
    columns:
      - name: inventory_item_id
        description: "Unique identifier for each inventory item."
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: distribution_center_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_distribution_centers')
                field: distribution_center_id
      - name: cost
        tests:
          - not_null
          - not_negative
      - name: created_at_utc
        tests:
          - not_null

  - name: stg_order_items
    description: "Staging model for individual items within an order. Granularity is one row per order item."
    columns:
      - name: order_item_id
        description: "Unique identifier for each order item."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Identifier for the associated order."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: inventory_item_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_inventory_items')
                field: inventory_item_id
      - name: sale_price
        tests:
          - not_null
          - not_negative
      - name: created_at_utc
        tests:
          - not_null

  - name: stg_orders
    description: "Staging model for order-level headers."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: num_of_item
        tests:
          - not_null
          - not_negative
      - name: created_at_utc
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Processing', 'Shipped', 'Complete', 'Cancelled', 'Returned']

  - name: stg_products
    description: "Staging model for product master data."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: distribution_center_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_distribution_centers')
                field: distribution_center_id
      - name: cost
        tests:
          - not_null
          - not_negative
      - name: retail_price
        tests:
          - not_negative